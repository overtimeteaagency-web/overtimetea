# Render Blueprint — API web service (monorepo root required)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: overtimetea-api
    runtime: node
    plan: free
    rootDir: .
    # Do not use corepack on Render — /usr/bin is read-only (EROFS)
    buildCommand: >-
      npm install -g pnpm@10.12.1 &&
      pnpm install --frozen-lockfile &&
      pnpm run build:api
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: overtimetea-db
          property: connectionString

databases:
  - name: overtimetea-db
    plan: free
    databaseName: overtimetea
    user: overtimetea
