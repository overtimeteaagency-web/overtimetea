# Render Blueprint — API web service (monorepo root required)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: overtimetea-api
    runtime: node
    plan: free
    rootDir: .
    # No global installs (corepack / npm -g) — /usr is read-only on Render
    buildCommand: npm run render:build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: overtimetea-db
          property: connectionString

databases:
  - name: overtimetea-db
    plan: free
    databaseName: overtimetea
    user: overtimetea
