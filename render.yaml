# Render Blueprint — API web service (monorepo root required)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: overtimetea-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.12.1 --activate &&
      pnpm install &&
      pnpm run build:api
    startCommand: pnpm run start:api
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: overtimetea-db
          property: connectionString

databases:
  - name: overtimetea-db
    plan: free
    databaseName: overtimetea
    user: overtimetea
