kind = "web"
previewPath = "/"
title = "Overtime Tea"
version = "1.0.0"
id = "artifacts/overtime-tea"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23779

[services.development]
run = "pnpm --filter @workspace/overtime-tea run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/overtime-tea", "run", "build" ]
publicDir = "artifacts/overtime-tea/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23779"
BASE_PATH = "/"
